<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/assets/root.css" rel="stylesheet" />
    <title>InkDrop Login</title>
</head>
<body>
    <main>
        <div class="login-box">
            <h1 class="intro">Welcome back to FtR</h1>
            <br><hr class="linebreaker" /><br>
            {{if .Error}}
                <div class="alert">
                    {{range $key, $msg := .Error}}
                        <p>{{$msg}}</p>
                    {{end}}
                </div>
            {{end}}
            <form method="post" name="login" action="/login">
                <input class="details" type="email" name="email" required placeholder="EMAIL" /><br><br>
                <input class="details" type="password" name="password" required placeholder="PASSWORD"><br><br>
                <button type="submit" class="redirect">Login</button><br><br>
            </form>
            <br><hr class="linebreaker"><br>
            <a href="/register"><button class="redirect">Register for a new account</button></a><br><br>
        </div>
    </main>
</body>
<style>
    * {
        scrollbar-width: none;
    }

    main {
        background-image: linear-gradient(
            to bottom,
            var(--primary),
            var(--secondary),
            var(--light-secondary)
        );
        opacity: 1;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        margin: 0px;
        padding: 0px;
        width: 100%;
        height: 100vh;
    }

    .login-box {
        padding: 60px;
        background-image: linear-gradient(
            to bottom,
            var(--grey),
            var(--dark)
        );
        color: white;
        border: 2px solid #fff;
        border-radius: 15px;
        box-shadow: 0px 0px 15px 5px var(--light-light-blue);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
    }
</style>
</html>
