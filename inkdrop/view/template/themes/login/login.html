<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/assets/root.css" rel="stylesheet" />
    <title>InkDrop Login</title>
</head>
<body>
    <main class="page">
        <section class="shell narrow">
            <div class="panel center auth-card stack-lg">
                <h1 class="intro">Sign in to InkDrop</h1>
                <p class="subtle">Use your FtR account credentials to open your repositories.</p>

                {{if .Error}}
                <div class="alert">
                    {{range $key, $msg := .Error}}
                    <p>{{$msg}}</p>
                    {{end}}
                </div>
                {{end}}

                <form method="post" name="login" action="/login" class="auth-form">
                    <label for="email" class="field-label">Email or Username</label>
                    <input id="email" class="details" type="text" name="email" required placeholder="you@example.com" autocomplete="email" />

                    <label for="password" class="field-label">Password</label>
                    <input id="password" class="details" type="password" name="password" required placeholder="Your password" autocomplete="current-password" />

                    <button type="submit" class="redirect">Sign In</button>
                </form>

                <hr class="linebreaker" />
                <p class="subtle">No account yet? <a class="nav-link" href="/register">Create one</a></p>
            </div>
        </section>
    </main>
    <script>
        (function () {
            var savedTheme = localStorage.getItem("inkdrop-theme");
            document.documentElement.setAttribute("data-theme", savedTheme === "dark" ? "dark" : "light");
        })();
    </script>
</body>
</html>
