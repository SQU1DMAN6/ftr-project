{{define "uploadForm"}}
<dialog class="settings-modal center popup" id="uploadDialog">
    <h3 class="section">Upload Files to Repository</h3>
    <p class="subtle">
        Upload multiple files to the working directory
        {{.Name}}/{{.Message3}}{{.Path}}
    </p>
    <br />
    <div class="drop-zone">
        <p>Drop files into this area or</p>
        <label for="fileToUpload" style="text-decoration: underline">
            Choose Files to Upload
        </label>
        <input type="file" name="fileToUpload" placeholder="Choose Files to Upload" id="uploadFile" multiple hidden />
    </div>
    <br />
    <div class="row">
        <button type="button" class="button-link" id="cancelUpload">
            Cancel
        </button>
    </div>

    <div id="progressWrap">
        <progress id="progressBar" value="0" max="100"></progress>
        <div id="status">Uploading...</div>
    </div>
</dialog>
{{end}}
<!--nested javascript things-->
{{define "uploadFormJS"}}
<script src="https://cdn.jsdelivr.net/npm/tus-js-client@latest/dist/tus.min.js"></script>
<script>
    const dropZone = document.querySelector(".drop-zone");
    const fileInput = document.querySelector("#uploadFile");
    const progressWrap = document.querySelector("#progressWrap");
    const progressBar = document.querySelector("#progressBar");
    const statusEl = document.querySelector("#status");

    function startUpload(file) {
        progressWrap.style.display = "block";
        statusEl.textContent = `Uploading ${file.name}`;

        const upload = new tus.Upload(file, {
            endpoint: "/upload/",
            retryDelays: [0, 1000, 2000, 3000, 4000, 5000],
            chunkSize: 5 * 1024 * 1024,
            metadata: {
                filename: file.name,
                filetype: file.type,
                username: "{{.Name}}",
                repository: "{{.Message3}}",
                workingDirectory: "{{.Path}}",
            },
            onError(error) {
                statusEl.textContent = `Error: ${error.message}`;
                console.error("Upload error:", error);
            },
            onProgress(bytesUploaded, bytesTotal) {
                console.log("Running onPress: ", bytesUploaded, bytesTotal);
                const pct = ((bytesUploaded / bytesTotal) * 100).toFixed(2);
                progressBar.value = pct;
                statusEl.textContent = `${pct}% - ${(bytesUploaded / 1024 / 1024).toFixed(2)} / ${(bytesTotal / 1024 / 1024).toFixed(2)} MB`;
            },
            onSuccess() {
                progressBar.value = 100;
                statusEl.textContent = `Upload completed. URL: ${upload.url}`;
                // Reload after a short delay so the user sees the new file
                setTimeout(() => window.location.reload(), 800);
            },
        });

        // debug
        //
        console.log("start uploading?");

        upload.findPreviousUploads().then((prev) => {
            if (prev.length > 0) {
                upload.resumeFromPreviousUpload(prev[0]);
                statusEl.textContent = `Resuming upload from ${((prev[0].uploadLengthDeferred || 0) / 1024 / 1024).toFixed(2)} MB ...`;
            }
            upload.start();
        });
    }

    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) {
            for (let i = 0; i < e.target.files.length; i++) {
                startUpload(e.target.files[i]);
            }
        }
    });

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("hover");
    });
    dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("hover"),
    );
    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("hover");
        const files = e.dataTransfer.files;
        if (files[0]) {
            for (let i = 0; i < files.length; i++) {
                startUpload(files[i]);
            }
        }
    });
</script>
{{end}}
